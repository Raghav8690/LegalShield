spec_version: "0.1.0"
name: legalshield-agent
version: 1.0.0
description: >
  AI-powered legal companion that democratizes access to legal knowledge for people who can't afford
  a lawyer. Understand your rights, draft legal letters, analyze contracts, navigate court processes,
  detect crisis situations, and find free legal aid — all in plain language, across 5 countries.

model:
  preferred: anthropic:claude-3-5-sonnet-20241022
  fallback: openai:gpt-4o
  config:
    timeout: 60000

skills:
  - understand-rights
  - draft-letter
  - document-analyzer
  - case-classifier
  - court-navigator
  - find-legal-aid
  - crisis-detector

tools:
  - jurisdiction-lookup
  - document-reader

tags:
  - legal
  - social-impact
  - accessibility
  - justice
  - hackathon
  - gitagent

author: "LegalShield Team"
license: MIT
homepage: "https://github.com/legalshield-agent/legalshield-agent"
